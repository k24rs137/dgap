<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ja"
      th:lang="${lang == 'ko' ? 'ko' : (lang == 'en' ? 'en' : 'ja')}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lang == 'ko' ? '회원가입' : (lang == 'en' ? 'Sign up' : (lang == 'hira' ? 'かいいんとうろく' : '会員登録'))}">会員登録</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="designed-page auth-redesign-page register-redesign-page">

<main class="auth-split-shell register-shell">

    <section class="auth-brand-panel register-brand-panel reveal">
        <a class="site-logo auth-logo" th:href="@{/(lang=${lang})}">
            <span class="site-logo-mark">D</span>
            <span>D-Gap</span>
        </a>
        <div class="auth-orbit register-orbit">
            <span></span><span></span><span></span>
            <strong>JOIN</strong>
        </div>
        <h1 th:text="${lang == 'ko' ? '학습을 시작해볼까요?' : (lang == 'en' ? 'Start your learning journey' : (lang == 'hira' ? 'がくしゅうをはじめよう' : '学習を始めよう'))}">学習を始めよう</h1>
        <p th:text="${lang == 'ko' ? '회원가입하면 학습 진행 상황을 저장할 수 있습니다.' : (lang == 'en' ? 'Create an account to save your learning progress.' : (lang == 'hira' ? 'とうろくすると、がくしゅうのすすみぐあいをほぞんできます。' : '登録すると、学習の進み具合を保存できます。'))}">登録すると学習進捗を保存できます。</p>
    </section>

    <section class="auth-form-panel reveal" data-tilt-card>
        <p class="designed-kicker" th:text="${lang == 'ko' ? 'NEW ACCOUNT' : (lang == 'en' ? 'NEW ACCOUNT' : (lang == 'hira' ? 'あたらしいあかうんと' : 'NEW ACCOUNT'))}">NEW ACCOUNT</p>
        <h2 th:text="${lang == 'ko' ? '회원가입' : (lang == 'en' ? 'Sign up' : (lang == 'hira' ? 'かいいんとうろく' : '会員登録'))}">会員登録</h2>

        <label class="auth-label" for="registerId" th:text="${lang == 'ko' ? '사용할 아이디' : (lang == 'en' ? 'User ID' : (lang == 'hira' ? 'つかうID' : '使用するID'))}">使用するID</label>
        <input class="auth-input" type="text" id="registerId"
               th:placeholder="${lang == 'ko' ? '아이디를 입력하세요' : (lang == 'en' ? 'Enter a user ID' : (lang == 'hira' ? 'IDをにゅうりょくしてください' : 'IDを入力してください'))}">

        <label class="auth-label" for="registerPassword" th:text="${lang == 'ko' ? '비밀번호' : (lang == 'en' ? 'Password' : (lang == 'hira' ? 'ぱすわーど' : 'パスワード'))}">パスワード</label>
        <input class="auth-input" type="password" id="registerPassword"
               th:placeholder="${lang == 'ko' ? '비밀번호를 입력하세요' : (lang == 'en' ? 'Enter a password' : (lang == 'hira' ? 'ぱすわーどをにゅうりょくしてください' : 'パスワードを入力してください'))}">

        <label class="auth-label" for="registerPasswordConfirm" th:text="${lang == 'ko' ? '비밀번호 확인' : (lang == 'en' ? 'Confirm password' : (lang == 'hira' ? 'ぱすわーどかくにん' : 'パスワード確認'))}">パスワード確認</label>
        <input class="auth-input" type="password" id="registerPasswordConfirm"
               th:placeholder="${lang == 'ko' ? '다시 입력하세요' : (lang == 'en' ? 'Enter the password again' : (lang == 'hira' ? 'もういちどにゅうりょくしてください' : 'もう一度入力してください'))}">

        <button type="button" id="registerButton" class="auth-main-button" data-ripple
                th:text="${lang == 'ko' ? '등록하기' : (lang == 'en' ? 'Create account' : (lang == 'hira' ? 'とうろくする' : '登録する'))}">登録する</button>

        <p id="registerMessage" class="auth-message"></p>

        <div class="auth-link-row">
            <a th:href="@{/login(lang=${lang})}"
               th:text="${lang == 'ko' ? '이미 계정이 있으신가요? 로그인' : (lang == 'en' ? 'Already have an account? Log in' : (lang == 'hira' ? 'すでにあかうんとがあるかたはこちら' : 'すでにアカウントがある方はこちら'))}">すでにアカウントがある方はこちら</a>
            <a th:href="@{/(lang=${lang})}"
               th:text="${lang == 'ko' ? '홈으로 돌아가기' : (lang == 'en' ? 'Back to home' : (lang == 'hira' ? 'ほーむへもどる' : 'トップへ戻る'))}">トップへ戻る</a>
        </div>
    </section>

</main>

<script th:src="@{/auth.js}"></script>
<script th:src="@{/script.js}"></script>
</body>
</html>
