<!DOCTYPE html>
<html th:lang="${lang}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${lang == 'ja'} ? '会員登録' : '회원가입'">
        会員登録
    </title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1 th:text="${lang == 'ja'} ? '会員登録' : '회원가입'"></h1>
    <p th:text="${lang == 'ja'} ? '新しいアカウントを作成します' : '새 계정을 만들어 서비스를 시작하세요'"></p>
</header>

<main>

    <section class="card">

        <label th:text="${lang == 'ja'} ? 'ユーザーID' : '아이디'"></label>
        <input
            type="text"
            id="registerId"
            th:placeholder="${lang == 'ja'} ? '使用するIDを入力' : '사용할 아이디를 입력하세요'">

        <br><br>

        <label th:text="${lang == 'ja'} ? 'パスワード' : '비밀번호'"></label>
        <input
            type="password"
            id="registerPassword"
            th:placeholder="${lang == 'ja'} ? 'パスワードを入力' : '비밀번호를 입력하세요'">

        <br><br>

        <label th:text="${lang == 'ja'} ? 'パスワード確認' : '비밀번호 확인'"></label>
        <input
            type="password"
            id="registerPasswordConfirm"
            th:placeholder="${lang == 'ja'} ? 'もう一度入力' : '비밀번호를 다시 입력하세요'">

        <br><br>

        <button
            type="button"
            id="registerButton"
            th:text="${lang == 'ja'} ? '会員登録' : '회원가입'">
        </button>

        <p id="registerMessage"></p>

        <p>
            <a th:href="${'/login?lang=' + lang}"
               th:text="${lang == 'ja'} ? 'すでにアカウントをお持ちの方はこちら' : '이미 계정이 있으신가요? 로그인'">
            </a>
        </p>

    </section>

    <a class="card" th:href="@{/(lang=${lang})}">
        <h2 th:text="${lang == 'ja'} ? 'メインへ戻る' : '메인으로 돌아가기'"></h2>
    </a>

</main>

<script src="/auth.js"></script>

</body>
</html>
