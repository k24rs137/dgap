<!DOCTYPE html>
<html th:lang="${lang}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${lang == 'ja'} ? 'ログイン' : '로그인'">
        ログイン
    </title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1 th:text="${lang == 'ja'} ? 'ログイン' : '로그인'"></h1>
    <p th:text="${lang == 'ja'} ? 'アカウントにログインしてサービスを利用しましょう' : '계정에 로그인하여 서비스를 이용하세요'"></p>
</header>

<main>

    <section class="card">

        <label th:text="${lang == 'ja'} ? 'ユーザーID' : '아이디'"></label>
        <input
            type="text"
            id="loginId"
            th:placeholder="${lang == 'ja'} ? 'ユーザーIDを入力' : '아이디를 입력하세요'">

        <br><br>

        <label th:text="${lang == 'ja'} ? 'パスワード' : '비밀번호'"></label>
        <input
            type="password"
            id="loginPassword"
            th:placeholder="${lang == 'ja'} ? 'パスワードを入力' : '비밀번호를 입력하세요'">

        <br><br>

        <button
            type="button"
            id="loginButton"
            th:text="${lang == 'ja'} ? 'ログイン' : '로그인'">
        </button>

        <p id="loginMessage"></p>

        <p>
            <a th:href="${'/register?lang=' + lang}"
               th:text="${lang == 'ja'} ? 'アカウントをお持ちでない方はこちら' : '계정이 없으신가요? 회원가입'">
            </a>
        </p>

    </section>

    <a class="card" th:href="@{/(lang=${lang})}">
        <h2 th:text="${lang == 'ja'} ? 'メインへ戻る' : '메인으로 돌아가기'"></h2>
    </a>

</main>

<script src="/auth.js"></script>

</body>
</html>
