<!DOCTYPE html>
<html th:lang="${lang}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${lang == 'ja'} ? 'コミュニティ' : '커뮤니티'"></title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1 th:text="${lang == 'ja'} ? 'コミュニティ' : '커뮤니티'"></h1>
</header>

<main>

<section class="card" id="notLoggedInArea">

    <h2 th:text="${lang == 'ja'} ? 'ログインが必要です' : '로그인이 필요합니다'"></h2>

    <p th:text="${lang == 'ja'}
        ? 'コミュニティ機能を利用するにはログインしてください。'
        : '커뮤니티 기능을 사용하려면 로그인해주세요.'">
    </p>

    <a class="card" th:href="${'/login?lang=' + lang}">
        <h3 th:text="${lang == 'ja'} ? 'ログインする' : '로그인하기'"></h3>
    </a>

</section>

<section class="card" id="loggedInArea" style="display: none;">

    <h2 th:text="${lang == 'ja'} ? 'コミュニティへようこそ' : '커뮤니티에 오신 것을 환영합니다'"></h2>

    <p id="userWelcome"></p>
    <button
    type="button"
    id="logoutButton"
    th:text="${lang == 'ja'} ? 'ログアウト' : '로그아웃'">
    </button>

    <textarea
        id="postInput"
        rows="4"
        th:placeholder="${lang == 'ja'} ? '質問や学んだことを書いてください' : '질문이나 배운 내용을 작성해주세요'">
    </textarea>

    <br><br>

    <button
        type="button"
        id="postButton"
        th:text="${lang == 'ja'} ? '投稿する' : '게시하기'">
    </button>

    <div id="postList"></div>

</section>

<a class="card" th:href="@{/(lang=${lang})}">
    <h2 th:text="${lang == 'ja'} ? 'メインへ戻る' : '메인으로 돌아가기'"></h2>
</a>

</main>

<script src="/community.js"></script>

</body>
</html>
