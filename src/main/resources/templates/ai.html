<!DOCTYPE html>
<html th:lang="${lang}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${lang == 'ja'} ? 'AI相談' : 'AI 상담'">AI相談</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1 th:text="${lang == 'ja'} ? 'AI相談' : 'AI 상담'"></h1>
    <p th:text="${lang == 'ja'}
        ? '困っていることを書くと、おすすめのレッスンを案内します。'
        : '어려운 점을 입력하면 추천 레슨을 안내합니다.'">
    </p>
</header>

<main>

<section class="card">
    <textarea
        id="aiInput"
        rows="4"
        th:placeholder="${lang == 'ja'} ? '例：メールを送りたい、道順を調べたい' : '예: 메일을 보내고 싶어요, 길을 찾고 싶어요'">
    </textarea>

    <br><br>

<button
    type="button"
    id="voiceButton"
    th:text="${lang == 'ja'} ? '🎤 音声入力' : '🎤 음성 입력'">
</button>

    <button
        type="button"
        id="aiButton"
        th:text="${lang == 'ja'} ? '相談する' : '상담하기'">
    </button>
</section>

<section class="card">
    <h2 th:text="${lang == 'ja'} ? 'おすすめ結果' : '추천 결과'"></h2>
    <div id="aiResult"></div>
</section>
<section class="card">
    <h2 th:text="${lang == 'ja'} ? '相談履歴' : '상담 기록'"></h2>
    <div id="aiHistory"></div>
</section>

<a class="card" th:href="@{/(lang=${lang})}">
    <h2 th:text="${lang == 'ja'} ? 'メインへ戻る' : '메인으로 돌아가기'"></h2>
</a>

</main>

<script src="/ai.js"></script>

</body>
</html>
